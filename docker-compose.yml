services:
  postgres:
    image: postgres:14
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medoed_db
      POSTGRES_USER: medoed_user
      POSTGRES_PASSWORD: medoed
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  medoedai:
    build: .
    container_name: medoedai
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      TORCHSERVE_URL: http://serving:8000/predict_ensemble
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
      FLASK_DEBUG: "False"
      PYTHONWARNINGS: "ignore::DeprecationWarning"
    env_file:
      - .env
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock # Для доступа к Docker API
    working_dir: /workspace
    command: >
      sh -c "
        python -c \"from utils.time_log import msk_tag; print(msk_tag('✅ Redis готов, запускаю Flask...'))\" &&
        python -W ignore::DeprecationWarning main.py
      "
    # CPU-only по умолчанию. GPU добавляется через docker-compose.gpu.yml

  frontend-next:
    image: node:22-alpine
    container_name: frontend-next
    depends_on:
      medoedai:
        condition: service_started
    restart: unless-stopped
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      MEDOED_BACKEND_URL: http://medoedai:5050
      NEXT_PUBLIC_LEGACY_UI_BASE_URL: http://localhost:5050
    ports:
      - "3001:3000"
    volumes:
      - ./frontend-next:/app
    working_dir: /app
    command: ["sh", "-lc", "npm run dev -- --hostname 0.0.0.0 --port 3000"]

  celery-worker:
    build: .
    container_name: celery-worker
    depends_on:
      medoedai:
        condition: service_started
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONWARNINGS: "ignore::DeprecationWarning"
      # Параллелизм Celery (обычные очереди)
      CELERY_POOL: prefork
      CELERY_CONCURRENCY: "8"
      # Ограничение потоков внутри NumPy/MKL/Torch
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      TORCH_NUM_THREADS: "4"
      # Явно скрыть GPU для воркера
      CUDA_VISIBLE_DEVICES: ""
    env_file:
      - .env
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    # Исключаем очередь train из общего воркера, чтобы не конкурировать за CPU
    command: ["sh","-lc","python -c \"import xgboost\" >/dev/null 2>&1 || pip install --no-cache-dir xgboost; python -c \"from utils.redis_utils import get_redis_client; rc=get_redis_client(); [rc.delete(k) for k in rc.keys('celery:train:xgb:*')]\" 2>/dev/null; python -W ignore::DeprecationWarning -m celery -A tasks worker -Q celery -P ${CELERY_POOL:-prefork} -c ${CELERY_CONCURRENCY:-8} --loglevel=info"]
    # CPU-only воркер: GPU не требуется

  # Специализированный воркер для торговли
  celery-trade:
    build: .
    container_name: celery-trade
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      serving:
        condition: service_started
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Новые ключи Bybit: используем индексированные переменные
      BYBIT_1_API_KEY: ${BYBIT_1_API_KEY:-}
      BYBIT_1_SECRET_KEY: ${BYBIT_1_SECRET_KEY:-}
      TRADING_MODE: ${TRADING_MODE:-sandbox}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONWARNINGS: "ignore::DeprecationWarning"
      SERVING_URL: http://serving:8000/predict_ensemble
    env_file:
      - .env
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: >
      sh -c "
        echo '🧹 Очищаю Redis-блокировки для торговых агентов...' &&
        redis-cli -h redis -p 6379 keys 'trading:agent_lock:*' | xargs -r redis-cli -h redis -p 6379 DEL &&
        echo '✅ Redis-блокировки удалены, запускаю Celery-воркер...' &&
        python -W ignore::DeprecationWarning -m celery -A tasks worker -Q trade -P prefork -c 8 --loglevel=info
      "

  signal-notifier:
    build:
      context: ./signal_notifier
    container_name: signal-notifier
    profiles: ["notifications"]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      SIGNAL_STREAM_NAME: ${SIGNAL_STREAM_NAME:-signals:events}
      SIGNAL_CONSUMER_GROUP: ${SIGNAL_CONSUMER_GROUP:-signal-notifier}
      SIGNAL_CONSUMER_NAME: ${SIGNAL_CONSUMER_NAME:-signal-notifier-1}
      SIGNAL_NOTIFIER_CHANNELS: ${SIGNAL_NOTIFIER_CHANNELS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_IDS: ${TELEGRAM_CHAT_IDS:-}
      MAX_API_URL: ${MAX_API_URL:-}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN:-}
      MAX_CHAT_IDS: ${MAX_CHAT_IDS:-}

  telegram-vless-proxy:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: telegram-vless-proxy
    restart: unless-stopped
    environment:
      VLESS_SERVER: ${VLESS_SERVER:-}
      VLESS_PORT: ${VLESS_PORT:-}
      VLESS_UUID: ${VLESS_UUID:-}
      VLESS_SECURITY: ${VLESS_SECURITY:-reality}
      VLESS_SNI: ${VLESS_SNI:-}
      VLESS_PUBLIC_KEY: ${VLESS_PUBLIC_KEY:-}
      VLESS_SHORT_ID: ${VLESS_SHORT_ID:-}
      VLESS_FLOW: ${VLESS_FLOW:-}
      VLESS_FINGERPRINT: ${VLESS_FINGERPRINT:-chrome}
    volumes:
      - ./infra/telegram-vless-proxy/start.sh:/start.sh:ro
      - ./infra/telegram-vless-proxy:/config:ro
    entrypoint: ["/bin/sh", "/start.sh"]

  # Специализированный воркер для обучения, использует все CPU ядра

  celery-train:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: celery-train
    depends_on:
      medoedai:
        condition: service_started
      redis:
        condition: service_healthy

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-all}   # 1,2,… или all
              capabilities: [gpu]

    stop_grace_period: 10s
    restart: "no"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONWARNINGS: "ignore::DeprecationWarning"
      NVIDIA_VISIBLE_DEVICES: ${USE_GPU:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      CELERY_POOL: solo
      CELERY_CONCURRENCY: "1"
      TRAIN_CPU_FRACTION: "0.9"
      # ЖЁСТКИЕ лимиты потоков научных либ для SubprocVectorEnv
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      TORCH_NUM_THREADS: "1"
      OMP_SCHEDULE: "dynamic"
      MKL_DYNAMIC: "true"
      MKL_INTERFACE_LAYER: "LP64"
    env_file:
      - .env
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: >
      sh -lc "
        sed -i 's/\r$//' scripts/wait-for-redis.sh &&
        chmod +x scripts/wait-for-redis.sh &&
        scripts/wait-for-redis.sh &&
        python scripts/purge-train-queue.py &&
        exec python -W ignore::DeprecationWarning -m celery -A tasks worker -Q train -P ${CELERY_POOL:-solo} -c ${CELERY_CONCURRENCY:-1} --loglevel=info
      "
  celery-beat:
    build: .
    container_name: celery-beat
    command: ["python", "-W", "ignore::DeprecationWarning", "-m", "celery", "-A", "tasks", "beat", "--loglevel=info"]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENABLE_TRADING_BEAT: "1"
      PYTHONWARNINGS: "ignore::DeprecationWarning"
    env_file:
      - .env      
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      - redis
      - celery-worker
    restart: unless-stopped

  # Специализированный воркер для OOS, изолированная очередь 'oos'
  celery-oos:
    build: .
    container_name: celery-oos
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      serving:
        condition: service_started
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
      SERVING_URL: http://serving:8000/predict_ensemble
      PYTHONWARNINGS: "ignore::DeprecationWarning"
      # ограничим потоки у научных либ, OOS CPU-bound
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      TORCH_NUM_THREADS: "1"
      CUDA_VISIBLE_DEVICES: ""
    env_file:
      - .env
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: ["sh","-lc","python -W ignore::DeprecationWarning -m celery -A tasks worker -Q oos -P prefork -c 30 --loglevel=info"]

  serving:
    build:
      context: ./serving
    container_name: serving
    restart: unless-stopped
    # Не зависит от веба, стартует независимо
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_BASE_DIR=/workspace/models
    ports:
      - "8000:8000"
    volumes:
      - ./serving:/app
      - .:/workspace
      - ./models:/workspace/models
    working_dir: /app
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2", "--timeout-keep-alive", "30"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    # CPU-only по умолчанию. GPU добавляется через docker-compose.gpu.yml

volumes:
  pgdata:
  redis-data:

