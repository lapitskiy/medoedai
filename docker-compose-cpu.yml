version: "3.9"

services:
  postgres:
    image: postgres:14
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medoed_db
      POSTGRES_USER: medoed_user
      POSTGRES_PASSWORD: medoed
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  medoedai:
    build: .
    container_name: medoedai
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      TORCHSERVE_URL: http://serving:8080/predictions/medoedai_model
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
      FLASK_DEBUG: "False"
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: >
      sh -c "
        python -c \"from utils.time_log import msk_tag; print(msk_tag('✅ Redis готов, запускаю Flask...'))\" &&
        python main.py
      "

  frontend-next:
    image: node:22-alpine
    container_name: frontend-next
    depends_on:
      medoedai:
        condition: service_started
    restart: unless-stopped
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      MEDOED_BACKEND_URL: http://medoedai:5050
      NEXT_PUBLIC_LEGACY_UI_BASE_URL: http://localhost:5050
    ports:
      - "3001:3000"
    volumes:
      - ./frontend-next:/app
    working_dir: /app
    command: ["sh", "-lc", "npm run dev -- --hostname 0.0.0.0 --port 3000"]

  celery-worker:
    build: .
    container_name: celery-worker
    depends_on:
      medoedai:
        condition: service_started
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
    env_file:
      - .env
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: ["celery", "-A", "tasks.celery_tasks", "worker",
              "-Q", "train", "-P", "solo", "-c", "1", "--loglevel=info"]

volumes:
  pgdata:
